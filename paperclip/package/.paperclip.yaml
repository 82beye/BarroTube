schema: "paperclip/v1"
agents:
  ceo:
    role: "ceo"
    icon: "crown"
    capabilities: "회사 미션 해석, 신규 채널 전략 수립, 부서장 채용 승인 요청, 월간 KPI 보고, 에피소드 총괄"
    adapter:
      config:
        dangerouslySkipPermissions: true
        model: "claude-opus-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
  producer:
    role: "producer"
    icon: "film"
    capabilities: "에피소드 전체 워크플로우 오케스트레이션, 자식 티켓 생성·라우팅·승인, 품질 게이트 관리"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 200
        model: "claude-opus-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
  market-researcher:
    role: "researcher"
    icon: "search"
    capabilities: "주제 키워드/레퍼런스 채널 분석, 후킹 패턴 추출, 경쟁 채널 분석, 10_market_research.md 작성"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 150
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  strategist:
    role: "strategist"
    icon: "target"
    capabilities: "타겟 페르소나·메시지·인트로 후킹·톤앤매너 정의, 영상 구조 설계, 20_strategy.md 작성"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 150
        model: "claude-opus-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  writer:
    role: "writer"
    icon: "pen-tool"
    capabilities: "장면(Scene) 단위 대본 작성, 이미지 프롬프트·BGM 무드·강조 토큰 첨부, 30_script.md 작성"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 200
        model: "claude-opus-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  fact-checker:
    role: "fact-checker"
    icon: "check-circle"
    capabilities: "수치·인용·고유명사 검증, 위험도 평가(LOW/MED/HIGH), 수정 제안, 35_factcheck.md 작성"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 150
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  asset-pm:
    role: "asset-manager"
    icon: "layers"
    capabilities: "장면 목록을 자산 작업 큐로 분해, Image Generator/Voice Engineer에 병렬 티켓 발급, 자산 집계·검증"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 150
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: false
  image-generator:
    role: "image-artist"
    icon: "image"
    capabilities: "프롬프트 → 이미지 생성, 스타일 락 적용, 콘텐츠 정책 안전화(safe-rewrite), 40_assets/images/ 저장"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 100
        model: "claude-haiku-4-5"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  voice-engineer:
    role: "voice-engineer"
    icon: "mic"
    capabilities: "장면별 TTS 합성, SSML 변환, 음성 길이 메타데이터 기록, 40_assets/tts/ 저장"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 100
        model: "claude-haiku-4-5"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  capcut-composer:
    role: "video-composer"
    icon: "scissors"
    capabilities: "30_script.md + 40_assets → 50_capcut_draft.json 생성, OS별 경로 변환, 자막 트랙 자동 생성"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 150
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  qa-reviewer:
    role: "qa-reviewer"
    icon: "shield"
    capabilities: "스크립트·음성·이미지·자막 정합성 검사, 환각 재검, 저작권 위험 판정, 60_qa_report.md 작성"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 150
        model: "claude-opus-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  metadata-writer:
    role: "metadata-writer"
    icon: "tag"
    capabilities: "제목 5안·설명·태그·해시태그·챕터·썸네일 카피 작성, 70_publish_meta.json 생성"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 100
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  publisher:
    role: "publisher"
    icon: "upload"
    capabilities: "Board 승인 후 YouTube Data API 업로드/예약, 결과 URL 회신"
    adapter:
      config:
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 50
        model: "claude-haiku-4-5"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
sidebar:
  agents:
    - "ceo"
    - "producer"
    - "market-researcher"
    - "strategist"
    - "writer"
    - "fact-checker"
    - "asset-pm"
    - "image-generator"
    - "voice-engineer"
    - "capcut-composer"
    - "qa-reviewer"
    - "metadata-writer"
    - "publisher"
